name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Mango.Specifications.sln

      - name: Build
        run: dotnet build Mango.Specifications.sln --no-restore --configuration Release

      - name: Test (unit only)
        run: dotnet test Mango.Specifications.sln --no-build --configuration Release --filter "Category!=Integration"
